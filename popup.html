<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>豆包原图助手</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:380px;
    padding:16px;
    font-family:
        "PingFang SC",
        "Microsoft YaHei",
        sans-serif;
    background:#f5f7fa;
}

.card{
    background:#fff;
    border-radius:12px;
    padding:16px;
    box-shadow:
        0 2px 8px rgba(0,0,0,.08);
}

.logo{
    font-size:18px;
    font-weight:600;
    margin-bottom:12px;
    color:#333;
}

.desc{
    font-size:12px;
    color:#999;
    margin-bottom:12px;
}

.label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    color:#666;
}

input{
    width:100%;
    height:38px;
    border:1px solid #dcdfe6;
    border-radius:8px;
    padding:0 12px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:#409eff;
    box-shadow:0 0 0 3px rgba(64,158,255,.15);
}

.actions{
    margin-top:14px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    height:38px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    transition:.2s;
}

.primary{
    background:#409eff;
    color:#fff;
}

.primary:hover{
    background:#66b1ff;
}

.secondary{
    background:#f0f2f5;
    color:#666;
}

.secondary:hover{
    background:#e4e7ed;
}

.status{
    margin-top:12px;
    padding:8px 10px;
    border-radius:8px;
    /* background:#f8f8f8; */
    font-size:12px;
    color:#666;
}

.footer{
    margin-top:12px;
    text-align:center;
    color:#999;
    font-size:11px;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">
        🖼 豆包原图助手
    </div>

    <div class="desc">
        处理失败可尝试刷新后重新去水印
    </div>

    <label class="label">
        用户 Token
    </label>

    <input
        id="tokenInput"
        type="text"
        placeholder="请输入 Token"
    />

    <div class="actions">
        <button id="scanBtn" class="primary">
            去水印
        </button>
    </div>

    <div class="status" id="status">
        等待操作...
    </div>

</div>

<div class="footer">
    v1.0.0
</div>

<script src="popup.js"></script>

</body>
</html>
