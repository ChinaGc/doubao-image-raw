<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆包原图助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 380px;
            padding: 18px;
            font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            background: linear-gradient(145deg,#f7f8fc,#eff2f9);
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(64,158,255,0.08),0 1px 4px rgba(0,0,0,0.04);
        }
        .logo {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap:6px;
        }
        .vx {
            margin-bottom: 16px;
            font-size:12px;
            color:#86909c;
        }
        .label {
            display: block;
            margin: 12px 0 6px;
            font-size:13px;
            color: #4b5563;
        }
        #tokenInput {
            width: 100%;
            height: 42px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 0 14px;
            font-size:13px;
            background:#fafbfd;
            outline: none;
            transition: all 0.24s ease;
        }
        #tokenInput:focus {
            border-color: #409eff;
            background:#fff;
            box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.12);
        }
        .exp-tip {
            margin-top:6px;
            font-size:12px;
        }
        .actions {
            margin-top: 18px;
        }
        #scanBtn {
            width:100%;
            height:42px;
            border: none;
            border-radius:10px;
            cursor: pointer;
            font-size:14px;
            font-weight:500;
            background: linear-gradient(135deg,#409eff,#3386e8);
            color:#fff;
            transition: all 0.22s ease;
        }
        #scanBtn:hover {
            background: linear-gradient(135deg,#54a8ff,#3b94f2);
            box-shadow:0 3px 10px rgba(64,158,255,0.25);
        }
        #scanBtn:active {
            transform: scale(0.98);
        }
        .status {
            margin-top:14px;
            padding:10px 12px;
            border-radius:10px;
            background:#f5f7fa;
            font-size:12.5px;
            color:#57606e;
            line-height:1.5;
        }
        .desc {
            margin-top:10px;
            font-size:12px;
            color:#949ca8;
            line-height:1.4;
        }
        .footer {
            margin-top:16px;
            text-align:center;
            font-size:12px;
            color:#a1aab8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🖼 豆包原图助手</div>
        <div class="vx" id="vx">作者微信号：XXX</div>

        <label class="label">用户 Token</label>
        <input id="tokenInput" placeholder="粘贴你的Token密钥">
        <div class="exp-tip" id="expDate">未填入Token</div>

        <div class="actions">
            <button id="scanBtn">一键去获取原图</button>
        </div>

        <div class="status" id="status">等待操作，填入Token后点击按钮开始处理</div>
        <div class="desc">处理失败可尝试刷新页面重试</div>
    </div>
    <div class="footer">v1.0.0 · 原图批量提取工具</div>

    <script src="popup.js"></script>
</body>
</html>
